name: Build & Deploy with EAS

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform to build (ios, android, or all)'
        type: string
        default: 'android'
      profile:
        description: 'EAS build profile (development, preview, production)'
        type: string
        default: 'production'
    secrets:
      EXPO_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
