name: Deploy to Railway

# Pre-requisite: caller repo must have a railway.toml (generated by `railway link`)
# OR set RAILWAY_SERVICE_ID as a repo secret/variable so `railway up` targets
# the correct project and service.

on:
  workflow_call:
    secrets:
      RAILWAY_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
